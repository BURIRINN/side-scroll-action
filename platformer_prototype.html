<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mini Platformer</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;overflow:hidden;font-family:system-ui;background:linear-gradient(#8fd3ff,#e0f2fe)}
    canvas{display:block;width:100vw;height:100vh}
    .ui{position:fixed;left:16px;top:16px;z-index:2;background:rgba(255,255,255,.92);padding:12px 14px;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:360px}
    .ui p{margin:6px 0;font-size:14px}
    .small{font-size:12px;color:#475569}
    .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.35);z-index:3}
    .overlay.show{display:flex}
    .card{background:#fff;padding:24px;border-radius:18px;text-align:center;width:min(92vw,420px)}
    button{border:0;background:#2563eb;color:#fff;border-radius:999px;padding:10px 14px;cursor:pointer}
  </style>
</head>
<body>
  <div class="ui">
    <p><b>移動</b> ← → / A D</p>
    <p><b>ジャンプ</b> Space / W / ↑</p>
    <p><b>能力使用</b> F</p>
    <p id="stats"></p>
    <p class="small">長いステージ版。危険物: トゲ土管 / 触れるとダメージの偽チェックポイント / 動く足場 / 消える足場 / 崩れる床 / バネ / トゲ / ベルトコンベア / 巨大化で壊せるブロック</p>
    <button id="restart">最初から</button>
  </div>

  <div class="overlay" id="ov">
    <div class="card">
      <h2 id="ovt">クリア</h2>
      <p id="ovm"></p>
      <button id="ovb">もう一度</button>
    </div>
  </div>

  <canvas id="c"></canvas>

  <script>
    var c = document.getElementById('c');
    var x = c.getContext('2d');
    var stats = document.getElementById('stats');
    var ov = document.getElementById('ov');
    var ovt = document.getElementById('ovt');
    var ovm = document.getElementById('ovm');
    var ovb = document.getElementById('ovb');
    var restartBtn = document.getElementById('restart');

    function resizeCanvas(){
      c.width = window.innerWidth;
      c.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    var K = {};
    var W = { w: 5600, h: 1200, g: 980, grav: 0.72, maxFall: 18 };
    var stage = {
      ground: [[0,980,640,160],[760,980,560,160],[1460,980,520,160],[2140,980,420,160],[2700,980,500,160],[3360,980,600,160],[4140,980,420,160],[4740,980,860,160]],
      bricks: [[220,900,120,28],[410,820,120,28],[600,740,120,28],[2860,820,120,28],[3530,900,120,28],[4950,830,120,28]],
      breakBricks: [[1090,840,70,28],[1170,840,70,28],[1250,840,70,28],[3820,840,70,28],[3900,840,70,28],[3980,840,70,28]],
      plats: [[860,880,140,20],[1580,820,120,20],[1730,740,120,20],[2290,840,120,20],[2440,760,120,20],[3400,860,130,20],[3650,760,120,20],[4310,800,130,20],[5120,760,140,20]],
      conveyors: [[470,956,130,12,1],[1540,956,160,12,-1],[2960,956,140,12,1],[4200,956,180,12,-1],[5250,956,160,12,1]],
      movers: [[970,690,120,18,940,1260,1.5],[2050,640,120,18,1970,2340,1.8],[3490,620,120,18,3400,3840,1.6],[4560,700,120,18,4480,5060,1.9]],
      vanish: [[1350,780,110,18,0],[1490,700,110,18,36],[1630,620,110,18,72],[1770,540,110,18,108],[4390,700,110,18,0],[4530,620,110,18,40],[4670,540,110,18,80]],
      crumble: [[1870,880,110,18],[2420,680,110,18],[2520,620,110,18],[3710,700,110,18],[4890,700,110,18],[5030,640,110,18]],
      springs: [[705,954,36,26],[2620,954,36,26],[4070,954,36,26],[5460,954,36,26]],
      spikes: [[650,964,90,16],[1330,964,90,16],[1985,964,110,16],[2580,964,80,16],[3320,964,120,16],[4090,964,90,16],[4660,964,120,16]],
      hazardPipes: [[885,900,60,80],[2360,900,60,80],[3580,900,60,80],[5180,900,60,80]],
      fakeChecks: [[1270,900],[2670,900],[4460,900]],
      boxes: [[760,840,'fire'],[1840,500,'ice'],[2740,780,'giant'],[3890,800,'fire'],[5320,780,'ice']],
      coins: [[255,850],[445,770],[635,690],[890,835],[1015,645],[1385,735],[1525,655],[1665,575],[1805,495],[1910,835],[2325,795],[2465,715],[2555,655],[2735,740],[3010,905],[3470,815],[3615,715],[3735,655],[3905,795],[4345,755],[4475,675],[4625,595],[4915,655],[5075,595],[5285,735],[5475,905]],
      enemies: [['walk',520,946,360,620],['hop',930,944,790,1250],['fly',1610,500,1470,1840],['walk',2240,946,2160,2520],['hop',2890,944,2760,3080],['fly',3550,600,3380,3880],['walk',4260,946,4180,4520],['hop',5120,944,5000,5460]],
      flag: [5480,720,260]
    };

    var cam = 0;
    var gameOver = 0;
    var clear = 0;
    var tick = 0;
    var msgAction = function(){};

    function mk(px, py, pw, ph){
      return { x:px, y:py, y0:py, w:pw, h:ph, vx:0, vy:0, px:px, py:py, dead:0 };
    }

    var p = null;
    var coins = [];
    var solids = [];
    var boxes = [];
    var items = [];
    var enemies = [];
    var shots = [];
    var spikes = [];
    var hazardPipes = [];
    var fakeChecks = [];
    var flag = null;
    var lives = 0;

    function safeList(v){
      return Object.prototype.toString.call(v) === '[object Array]' ? v : [];
    }

    function label(v){
      if (v === 'fire') return 'ファイア';
      if (v === 'ice') return 'フリーズ';
      if (v === 'giant') return '巨大化';
      return 'ノーマル';
    }

    function show(t, m, a){
      ov.className = 'overlay show';
      ovt.textContent = t;
      ovm.textContent = m;
      msgAction = typeof a === 'function' ? a : function(){};
    }

    function hide(){
      ov.className = 'overlay';
    }

    function upd(){
      var list = safeList(coins);
      var got = 0;
      var i;
      for (i = 0; i < list.length; i++) {
        if (list[i] && list[i].got) got++;
      }
      stats.textContent = 'コイン: ' + got + ' / ' + list.length + '　残機: ' + lives + '　能力: ' + (p ? label(p.power) : 'ノーマル');
    }

    function makeSolid(a, t){
      return { x:a[0], y:a[1], w:a[2], h:a[3], t:t, dead:0, dx:0 };
    }

    function solidActive(s, time){
      var localTime = typeof time === 'number' ? time : tick;
      if (!s || s.dead) return false;
      if (s.t === 'v') return ((localTime + s.ph) % 180) < 112;
      if (s.t === 'cr') return s.gone <= 0;
      return true;
    }

    function oneWay(s){
      if (!s) return false;
      return s.t === 'p' || s.t === 'cv' || s.t === 'm' || s.t === 'v' || s.t === 'cr' || s.t === 'sp';
    }

    function reset(){
      var i, a, e;
      p = mk(80, 924, 42, 56);
      p.face = 1;
      p.on = 0;
      p.buf = 0;
      p.coy = 0;
      p.inv = 0;
      p.power = 'normal';
      p.timer = 0;
      p.cool = 0;
      p.spawnX = 80;
      p.spawnY = 924;
      p.ground = null;

      coins = [];
      for (i = 0; i < stage.coins.length; i++) {
        a = stage.coins[i];
        coins.push({ x:a[0], y:a[1], r:11, t:Math.random()*9, got:0 });
      }

      solids = [];
      for (i = 0; i < stage.ground.length; i++) solids.push(makeSolid(stage.ground[i], 'g'));
      for (i = 0; i < stage.bricks.length; i++) solids.push(makeSolid(stage.bricks[i], 'b'));
      for (i = 0; i < stage.breakBricks.length; i++) {
        a = stage.breakBricks[i];
        solids.push({ x:a[0], y:a[1], w:a[2], h:a[3], t:'bb', dead:0, dx:0 });
      }
      for (i = 0; i < stage.plats.length; i++) solids.push(makeSolid(stage.plats[i], 'p'));
      for (i = 0; i < stage.conveyors.length; i++) {
        a = stage.conveyors[i];
        solids.push({ x:a[0], y:a[1], w:a[2], h:a[3], t:'cv', dir:a[4], dead:0, dx:0 });
      }
      for (i = 0; i < stage.movers.length; i++) {
        a = stage.movers[i];
        solids.push({ x:a[0], y:a[1], y0:a[1], w:a[2], h:a[3], t:'m', min:a[4], max:a[5], v:a[6], dead:0, dx:0 });
      }
      for (i = 0; i < stage.vanish.length; i++) {
        a = stage.vanish[i];
        solids.push({ x:a[0], y:a[1], w:a[2], h:a[3], t:'v', ph:a[4], dead:0, dx:0 });
      }
      for (i = 0; i < stage.crumble.length; i++) {
        a = stage.crumble[i];
        solids.push({ x:a[0], y:a[1], w:a[2], h:a[3], t:'cr', timer:0, gone:0, dead:0, dx:0 });
      }
      for (i = 0; i < stage.springs.length; i++) {
        a = stage.springs[i];
        solids.push({ x:a[0], y:a[1], w:a[2], h:a[3], t:'sp', dead:0, dx:0 });
      }

      boxes = [];
      for (i = 0; i < stage.boxes.length; i++) {
        a = stage.boxes[i];
        boxes.push({ x:a[0], y:a[1], w:34, h:34, type:a[2], used:0, bump:0, t:'q', dead:0, dx:0 });
      }
      for (i = 0; i < boxes.length; i++) solids.push(boxes[i]);

      items = [];
      shots = [];
      spikes = [];
      for (i = 0; i < stage.spikes.length; i++) {
        a = stage.spikes[i];
        spikes.push({ x:a[0], y:a[1], w:a[2], h:a[3] });
      }
      hazardPipes = [];
      for (i = 0; i < stage.hazardPipes.length; i++) {
        a = stage.hazardPipes[i];
        hazardPipes.push({ x:a[0], y:a[1], w:a[2], h:a[3] });
      }
      fakeChecks = [];
      for (i = 0; i < stage.fakeChecks.length; i++) {
        a = stage.fakeChecks[i];
        fakeChecks.push({ x:a[0], y:a[1], w:28, h:84 });
      }

      enemies = [];
      for (i = 0; i < stage.enemies.length; i++) {
        e = stage.enemies[i];
        if (e[0] === 'walk') {
          var w1 = mk(e[1], e[2], 40, 34);
          w1.type = 'walk'; w1.min = e[3]; w1.max = e[4]; w1.vx = -1.2; w1.fz = 0;
          enemies.push(w1);
        } else if (e[0] === 'hop') {
          var h1 = mk(e[1], e[2], 38, 36);
          h1.type = 'hop'; h1.min = e[3]; h1.max = e[4]; h1.vx = -1.35; h1.j = 60; h1.ph = Math.random()*6; h1.fz = 0;
          enemies.push(h1);
        } else {
          var f1 = mk(e[1], e[2], 44, 28);
          f1.type = 'fly'; f1.min = e[3]; f1.max = e[4]; f1.vx = -1.4; f1.ph = Math.random()*6; f1.fz = 0;
          enemies.push(f1);
        }
      }

      flag = { x:stage.flag[0], y:stage.flag[1], h:stage.flag[2] };
      cam = 0;
      lives = 3;
      gameOver = 0;
      clear = 0;
      tick = 0;
      hide();
      upd();
    }

    function A(a, b){
      return !!(a && b && a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y);
    }

    function updateSolid(s){
      if (!s || s.dead) return;
      s.dx = 0;
      if (s.t === 'm') {
        var px = s.x;
        s.x += s.v;
        if (s.x <= s.min || s.x >= s.max) {
          s.x = Math.max(s.min, Math.min(s.max, s.x));
          s.v *= -1;
        }
        s.dx = s.x - px;
      } else if (s.t === 'q' && s.bump > 0) {
        s.bump--;
      } else if (s.t === 'cr') {
        if (s.gone > 0) s.gone--;
        else if (s.timer > 0) {
          s.timer--;
          if (!s.timer) s.gone = 180;
        }
      }
    }

    function hcol(o){
      var i, s, pr, pl, cr, cl;
      if (!o) return;
      for (i = 0; i < solids.length; i++) {
        s = solids[i];
        if (!solidActive(s) || oneWay(s)) continue;
        if (o.y + o.h - 2 <= s.y || o.y >= s.y + s.h - 2) continue;
        pr = o.px + o.w; pl = o.px; cr = o.x + o.w; cl = o.x;
        if (o.vx > 0 && pr <= s.x && cr >= s.x) {
          if (o === p && p.power === 'giant' && s.t === 'bb') { s.dead = 1; continue; }
          o.x = s.x - o.w;
          o.vx = o.type ? -Math.abs(o.vx) : 0;
        } else if (o.vx < 0 && pl >= s.x + s.w && cl <= s.x + s.w) {
          if (o === p && p.power === 'giant' && s.t === 'bb') { s.dead = 1; continue; }
          o.x = s.x + s.w;
          o.vx = o.type ? Math.abs(o.vx) : 0;
        }
      }
    }

    function hitBox(b){
      if (!b) return;
      b.bump = 6;
      if (b.used) return;
      b.used = 1;
      items.push({ x:b.x+5, y:b.y-28, w:24, h:24, type:b.type, pop:18, life:900, ph:Math.random()*6, dead:0 });
    }

    function vcol(o){
      var i, s, pb, cb, pt, ct;
      if (!o) return 0;
      var land = 0;
      o.ground = null;
      for (i = 0; i < solids.length; i++) {
        s = solids[i];
        if (!solidActive(s)) continue;
        if (o.x + o.w - 4 <= s.x || o.x + 4 >= s.x + s.w) continue;
        pb = o.py + o.h; cb = o.y + o.h; pt = o.py; ct = o.y;
        if (oneWay(s)) {
          if (o.vy >= 0 && pb <= s.y + 4 && cb >= s.y) {
            o.y = s.y - o.h;
            if (s.t === 'sp') {
              o.vy = -20;
              if (o === p) o.on = 0;
            } else {
              o.vy = 0;
              land = 1;
              o.ground = s;
              if (s.t === 'cr' && o === p && !s.timer) s.timer = 28;
            }
          }
          continue;
        }
        if (o.vy >= 0 && pb <= s.y && cb >= s.y) {
          o.y = s.y - o.h;
          o.vy = 0;
          land = 1;
          o.ground = s;
        } else if (o.vy < 0 && pt >= s.y + s.h && ct <= s.y + s.h) {
          if (o === p && p.power === 'giant' && s.t === 'bb') { s.dead = 1; continue; }
          o.y = s.y + s.h;
          o.vy = 0;
          if (s.t === 'q') hitBox(s);
        }
      }
      return land;
    }

    function usePower(){
      if (!p || gameOver || clear || p.cool > 0) return;
      if (p.power !== 'fire' && p.power !== 'ice') return;
      shots.push({
        x: p.x + (p.face > 0 ? p.w + 4 : -10),
        y: p.y + p.h * 0.42,
        w: 16,
        h: 16,
        vx: p.face * (p.power === 'fire' ? 11 : 9),
        vy: p.power === 'fire' ? -2.6 : -1.2,
        g: p.power === 'fire' ? 0.18 : 0.08,
        type: p.power,
        life: 120,
        dead: 0
      });
      p.cool = p.power === 'fire' ? 18 : 22;
    }

    function hurt(){
      if (!p || p.inv || gameOver || clear) return;
      lives--;
      upd();
      if (lives <= 0) {
        gameOver = 1;
        show('ゲームオーバー', 'もう一度遊びますか？', reset);
        return;
      }
      p.x = p.spawnX;
      p.y = p.spawnY;
      p.vx = 0;
      p.vy = 0;
      p.inv = 90;
      p.power = 'normal';
      p.timer = 0;
      p.w = 42;
      p.h = 56;
      p.ground = null;
      shots = [];
      items = [];
    }

    function setPower(t){
      if (!p) return;
      var bottom = p.y + p.h;
      p.power = t;
      if (t === 'giant') {
        p.w = 58;
        p.h = 78;
        p.timer = 900;
      } else {
        p.w = 42;
        p.h = 56;
        p.timer = 0;
      }
      p.y = bottom - p.h;
      upd();
    }

    function hitEnemy(e){
      var stomp;
      if (!p || !e || p.inv || e.dead || !A(p, {x:e.x+3, y:e.y+2, w:e.w-6, h:e.h-2})) return;
      stomp = p.vy > 0 && p.py + p.h <= e.y + 14;
      if (stomp || p.power === 'giant' || e.fz > 0) {
        e.dead = 1;
        if (stomp) {
          p.vy = -10.8;
          p.on = 0;
        }
      } else {
        hurt();
      }
    }

    function enemyStep(e){
      if (!e || e.dead) return;
      if (e.fz > 0) {
        e.fz--;
        hitEnemy(e);
        return;
      }
      e.px = e.x;
      e.py = e.y;
      if (e.type === 'fly') {
        e.x += e.vx;
        if (e.x <= e.min) e.vx = Math.abs(e.vx);
        if (e.x + e.w >= e.max) e.vx = -Math.abs(e.vx);
        e.ph += 0.08;
        e.y = e.y0 + Math.sin(e.ph) * 48;
        hitEnemy(e);
        return;
      }
      if (e.type === 'hop') {
        if (e.j > 0) e.j--;
        else { e.vy = -11.8; e.j = 70; }
      }
      e.vy = Math.min(W.maxFall, e.vy + W.grav);
      e.x += e.vx;
      hcol(e);
      e.y += e.vy;
      vcol(e);
      if (e.x <= e.min) e.vx = Math.abs(e.vx);
      if (e.x + e.w >= e.max) e.vx = -Math.abs(e.vx);
      hitEnemy(e);
    }

    function distance(ax, ay, bx, by){
      var dx = ax - bx;
      var dy = ay - by;
      return Math.sqrt(dx*dx + dy*dy);
    }

    function step(){
      var i, s, o, e, c0, it, sp, hp, fc;
      if (!p || gameOver || clear) return;
      tick++;

      for (i = 0; i < solids.length; i++) updateSolid(solids[i]);

      p.px = p.x;
      p.py = p.y;
      var L = K.ArrowLeft || K.a || K.A;
      var Rr = K.ArrowRight || K.d || K.D;
      var J = K[' '] || K.ArrowUp || K.w || K.W;
      var acc = p.on ? 0.82 : 0.48;
      var fr = p.on ? 0.76 : 0.97;
      if (L && !Rr) { p.vx -= acc; p.face = -1; }
      else if (Rr && !L) { p.vx += acc; p.face = 1; }
      else { p.vx *= fr; if (Math.abs(p.vx) < 0.04) p.vx = 0; }

      var speed = p.power === 'giant' ? 8.4 : 7.2;
      var jump = p.power === 'giant' ? 16.6 : 15.2;
      p.vx = Math.max(-speed, Math.min(speed, p.vx));
      p.coy = p.on ? 7 : Math.max(0, p.coy - 1);
      if (p.buf > 0) p.buf--;
      if (p.cool > 0) p.cool--;
      if (p.buf && p.coy) { p.vy = -jump; p.buf = 0; p.coy = 0; p.on = 0; }
      if (!J && p.vy < -5) p.vy += 0.65;
      if (p.power === 'giant' && p.timer > 0) {
        p.timer--;
        if (!p.timer) setPower('normal');
      }

      p.vy = Math.min(W.maxFall, p.vy + W.grav);
      p.x += p.vx;
      hcol(p);
      p.on = 0;
      p.y += p.vy;
      p.on = vcol(p);
      if (p.on && p.ground) {
        if (p.ground.t === 'm') p.x += p.ground.dx;
        if (p.ground.t === 'cv') p.x += p.ground.dir * 1.6;
      }
      p.x = Math.max(0, Math.min(W.w - p.w, p.x));
      if (p.y > W.h + 260) hurt();
      if (p.inv > 0) p.inv--;

      for (i = 0; i < coins.length; i++) {
        c0 = coins[i];
        if (!c0 || c0.got) continue;
        c0.t += 0.08;
        if (distance(p.x + p.w/2, p.y + p.h/2, c0.x, c0.y) < 24) {
          c0.got = 1;
          upd();
        }
      }

      for (i = 0; i < items.length; i++) {
        it = items[i];
        if (!it || it.dead) continue;
        it.life--;
        if (it.life <= 0) { it.dead = 1; continue; }
        if (it.pop > 0) { it.y -= 1.8; it.pop--; }
        else { it.ph += 0.08; it.y += Math.sin(it.ph) * 0.3; }
        if (A(p, it)) { setPower(it.type); it.dead = 1; }
      }

      for (i = 0; i < shots.length; i++) {
        s = shots[i];
        if (!s || s.dead) continue;
        s.life--;
        if (s.life <= 0) { s.dead = 1; continue; }
        s.vy += s.g;
        s.x += s.vx;
        s.y += s.vy;
        for (o = 0; o < solids.length; o++) {
          var so = solids[o];
          if (solidActive(so) && so.t !== 'p' && so.t !== 'v' && A(s, so)) s.dead = 1;
        }
        for (e = 0; e < enemies.length; e++) {
          var en = enemies[e];
          if (!en || en.dead) continue;
          if (A(s, {x:en.x+3, y:en.y+2, w:en.w-6, h:en.h-2})) {
            if (s.type === 'fire') en.dead = 1;
            else en.fz = 220;
            s.dead = 1;
          }
        }
      }

      for (i = 0; i < enemies.length; i++) enemyStep(enemies[i]);
      for (i = 0; i < spikes.length; i++) { sp = spikes[i]; if (A(p, sp)) hurt(); }
      for (i = 0; i < hazardPipes.length; i++) { hp = hazardPipes[i]; if (A(p, hp)) hurt(); }
      for (i = 0; i < fakeChecks.length; i++) { fc = fakeChecks[i]; if (A(p, fc)) hurt(); }

      if (flag && p.x + p.w > flag.x && p.y + p.h > flag.y) {
        var gotCoins = 0;
        for (i = 0; i < coins.length; i++) if (coins[i] && coins[i].got) gotCoins++;
        clear = 1;
        show('クリア！', 'コイン ' + gotCoins + ' / ' + coins.length + ' を集めました。', reset);
      }

      cam += ((p.x - c.width * 0.33 + p.vx * 18) - cam) * 0.12;
      cam = Math.max(0, Math.min(W.w - c.width, cam));
    }

    function rr(x0, y0, w, h, r){
      x.beginPath();
      x.moveTo(x0+r, y0);
      x.lineTo(x0+w-r, y0);
      x.quadraticCurveTo(x0+w, y0, x0+w, y0+r);
      x.lineTo(x0+w, y0+h-r);
      x.quadraticCurveTo(x0+w, y0+h, x0+w-r, y0+h);
      x.lineTo(x0+r, y0+h);
      x.quadraticCurveTo(x0, y0+h, x0, y0+h-r);
      x.lineTo(x0, y0+r);
      x.quadraticCurveTo(x0, y0, x0+r, y0);
      x.closePath();
    }

    function draw(){
      var i, s, X, Y, bump, active, hp, fc, sp, c0, it, e, PX, PY, sx, sy, FX, bx, cx, cy;
      var g = x.createLinearGradient(0, 0, 0, c.height);
      g.addColorStop(0, '#8fd3ff');
      g.addColorStop(1, '#e0f2fe');
      x.fillStyle = g;
      x.fillRect(0, 0, c.width, c.height);

      x.fillStyle = '#94a3b8';
      for (i = -1; i < 12; i++) {
        bx = i * 340 - ((cam * 0.24) % 340);
        x.beginPath();
        x.moveTo(bx, W.g + 24);
        x.lineTo(bx + 90, W.g - 180);
        x.lineTo(bx + 180, W.g + 24);
        x.closePath();
        x.fill();
      }

      x.fillStyle = 'rgba(255,255,255,.9)';
      for (i = 0; i < 7; i++) {
        cx = i * 480 - ((cam * 0.12) % 480) + 120;
        cy = 120 + (i % 3) * 35;
        x.beginPath();
        x.arc(cx, cy, 22, 0, 7);
        x.arc(cx + 28, cy - 8, 28, 0, 7);
        x.arc(cx + 58, cy, 22, 0, 7);
        x.fill();
      }

      for (i = 0; i < solids.length; i++) {
        s = solids[i];
        if (!s || s.dead) continue;
        active = solidActive(s);
        X = s.x - cam;
        bump = s.t === 'q' ? Math.sin((6 - s.bump) / 6 * Math.PI) * 8 : 0;
        Y = s.y - (s.bump ? bump : 0);
        if (s.t === 'g') {
          x.fillStyle = '#4caf50';
          x.fillRect(X, Y, s.w, 12);
          x.fillStyle = '#7c5b3c';
          x.fillRect(X, Y + 12, s.w, s.h - 12);
        } else if (s.t === 'b' || s.t === 'bb') {
          x.fillStyle = s.t === 'bb' ? '#f59e0b' : '#d97745';
          x.fillRect(X, Y, s.w, s.h);
          x.fillStyle = 'rgba(0,0,0,.12)';
          for (var bi = 12; bi < s.w; bi += 18) x.fillRect(X + bi, Y, 2, s.h);
        } else if (s.t === 'p') {
          x.fillStyle = '#d9a35f';
          x.fillRect(X, Y, s.w, s.h);
        } else if (s.t === 'cv') {
          x.fillStyle = '#475569';
          x.fillRect(X, Y, s.w, s.h);
          x.fillStyle = '#cbd5e1';
          for (var ci = 10; ci < s.w; ci += 24) {
            x.beginPath();
            x.moveTo(X + ci, Y + 2);
            x.lineTo(X + ci + (s.dir > 0 ? 10 : -10), Y + s.h / 2);
            x.lineTo(X + ci, Y + s.h - 2);
            x.closePath();
            x.fill();
          }
        } else if (s.t === 'm') {
          x.fillStyle = '#06b6d4';
          x.fillRect(X, Y, s.w, s.h);
          x.fillStyle = '#cffafe';
          x.fillRect(X + 6, Y + 4, s.w - 12, 4);
        } else if (s.t === 'v') {
          if (!active) {
            if (x.setLineDash) x.setLineDash([6,6]);
            x.strokeStyle = 'rgba(148,163,184,.35)';
            x.strokeRect(X, Y, s.w, s.h);
            if (x.setLineDash) x.setLineDash([]);
          } else {
            x.fillStyle = '#a78bfa';
            x.fillRect(X, Y, s.w, s.h);
          }
        } else if (s.t === 'cr') {
          if (active) {
            x.fillStyle = '#8b5e3c';
            x.fillRect(X, Y, s.w, s.h);
            x.strokeStyle = '#f8fafc';
            x.beginPath();
            x.moveTo(X + 14, Y + 3);
            x.lineTo(X + 28, Y + s.h - 3);
            x.moveTo(X + 42, Y + 3);
            x.lineTo(X + 58, Y + s.h - 3);
            x.stroke();
          }
        } else if (s.t === 'sp') {
          x.fillStyle = '#10b981';
          x.fillRect(X, Y + 10, s.w, s.h - 10);
          x.fillStyle = '#86efac';
          x.fillRect(X + 4, Y + 4, s.w - 8, 10);
        } else if (s.t === 'q') {
          x.fillStyle = s.used ? '#94a3b8' : '#fbbf24';
          x.fillRect(X, Y, s.w, s.h);
          x.strokeStyle = s.used ? '#64748b' : '#b45309';
          x.lineWidth = 3;
          x.strokeRect(X + 1.5, Y + 1.5, s.w - 3, s.h - 3);
          x.fillStyle = s.used ? '#475569' : '#b45309';
          if (s.used) {
            x.fillRect(X + 10, Y + 12, 14, 10);
            x.fillRect(X + 12, Y + 24, 10, 4);
          } else {
            x.font = 'bold 22px system-ui';
            x.fillText('?', X + 10, Y + 24);
          }
        }
      }

      for (i = 0; i < hazardPipes.length; i++) {
        hp = hazardPipes[i];
        if (!hp) continue;
        X = hp.x - cam;
        x.fillStyle = '#16a34a';
        x.fillRect(X, hp.y + 18, hp.w, hp.h - 18);
        x.fillStyle = '#15803d';
        x.fillRect(X + 6, hp.y + 8, hp.w - 12, 14);
        x.fillStyle = '#ef4444';
        for (var pi = 0; pi < hp.w; pi += 12) {
          x.beginPath();
          x.moveTo(X + pi, hp.y + 18);
          x.lineTo(X + pi + 6, hp.y);
          x.lineTo(X + pi + 12, hp.y + 18);
          x.closePath();
          x.fill();
        }
      }

      for (i = 0; i < fakeChecks.length; i++) {
        fc = fakeChecks[i];
        if (!fc) continue;
        X = fc.x - cam;
        x.fillStyle = '#64748b';
        x.fillRect(X + 10, fc.y, 8, fc.h);
        x.fillStyle = '#ef4444';
        for (var fi = 0; fi < 5; fi++) {
          x.beginPath();
          x.moveTo(X + 6 + fi * 6, fc.y + 10);
          x.lineTo(X + 9 + fi * 6, fc.y);
          x.lineTo(X + 12 + fi * 6, fc.y + 10);
          x.closePath();
          x.fill();
        }
        x.beginPath();
        x.moveTo(X + 18, fc.y + 12);
        x.lineTo(X + 44, fc.y + 22);
        x.lineTo(X + 18, fc.y + 34);
        x.closePath();
        x.fillStyle = '#ef4444';
        x.fill();
      }

      for (i = 0; i < spikes.length; i++) {
        sp = spikes[i];
        if (!sp) continue;
        x.fillStyle = '#ef4444';
        for (var si = 0; si < sp.w; si += 16) {
          x.beginPath();
          x.moveTo(sp.x - cam + si, sp.y + sp.h);
          x.lineTo(sp.x - cam + si + 8, sp.y);
          x.lineTo(sp.x - cam + si + 16, sp.y + sp.h);
          x.closePath();
          x.fill();
        }
      }

      for (i = 0; i < coins.length; i++) {
        c0 = coins[i];
        if (c0 && !c0.got) {
          x.fillStyle = '#facc15';
          x.beginPath();
          x.ellipse(c0.x - cam, c0.y + Math.sin(c0.t) * 3, 8 + Math.sin(c0.t) * 2, 11, 0, 0, 7);
          x.fill();
          x.strokeStyle = '#ca8a04';
          x.stroke();
        }
      }

      for (i = 0; i < items.length; i++) {
        it = items[i];
        if (!it || it.dead) continue;
        X = it.x - cam;
        Y = it.y + (it.pop ? 0 : Math.sin(it.ph) * 2);
        if (it.type === 'fire') {
          x.fillStyle = '#fb7185';
          x.beginPath();
          x.moveTo(X+12,Y);
          x.quadraticCurveTo(X+24,Y+7,X+18,Y+22);
          x.quadraticCurveTo(X+12,Y+18,X+9,Y+24);
          x.quadraticCurveTo(X+2,Y+16,X+4,Y+8);
          x.quadraticCurveTo(X+7,Y+2,X+12,Y);
          x.fill();
        } else if (it.type === 'ice') {
          x.fillStyle = '#60a5fa';
          x.beginPath();
          x.moveTo(X+12,Y);
          x.lineTo(X+24,Y+12);
          x.lineTo(X+12,Y+24);
          x.lineTo(X,Y+12);
          x.closePath();
          x.fill();
        } else {
          x.fillStyle = '#34d399';
          x.beginPath();
          x.arc(X+12, Y+12, 11, 0, 7);
          x.fill();
          x.fillStyle = '#065f46';
          x.fillRect(X+10, Y+4, 4, 16);
          x.fillRect(X+4, Y+10, 16, 4);
        }
      }

      for (i = 0; i < enemies.length; i++) {
        e = enemies[i];
        if (e && !e.dead) {
          X = e.x - cam;
          Y = e.y;
          x.fillStyle = e.fz ? '#93c5fd' : (e.type === 'walk' ? '#7c3f00' : (e.type === 'hop' ? '#6d28d9' : '#0f766e'));
          rr(X, Y+8, e.w, e.h-8, 12);
          x.fill();
          x.fillStyle = e.fz ? '#dbeafe' : '#f5c9a5';
          x.fillRect(X+6, Y+4, e.w-12, 12);
          x.fillStyle = '#111827';
          x.fillRect(X+11, Y+10, 4, 4);
          x.fillRect(X+e.w-15, Y+10, 4, 4);
          x.fillRect(X+10, Y+e.h-8, 8, 6);
          x.fillRect(X+e.w-18, Y+e.h-8, 8, 6);
        }
      }

      for (i = 0; i < shots.length; i++) {
        s = shots[i];
        if (s && !s.dead) {
          X = s.x - cam;
          x.fillStyle = s.type === 'fire' ? '#fb7185' : '#60a5fa';
          if (s.type === 'fire') {
            x.beginPath();
            x.arc(X+8, s.y+8, 8, 0, 7);
            x.fill();
            x.fillStyle = '#fde68a';
            x.beginPath();
            x.arc(X+8, s.y+8, 4, 0, 7);
            x.fill();
          } else {
            rr(X+1, s.y+1, 14, 14, 4);
            x.fill();
            x.fillStyle = '#eff6ff';
            x.fillRect(X+5, s.y+4, 6, 8);
          }
        }
      }

      if (p && !(p.inv && Math.floor(p.inv/4)%2)) {
        PX = p.x - cam;
        PY = p.y;
        sx = p.w / 42;
        sy = p.h / 56;
        if (p.power !== 'normal') {
          x.fillStyle = p.power === 'fire' ? 'rgba(251,113,133,.25)' : (p.power === 'ice' ? 'rgba(96,165,250,.22)' : 'rgba(52,211,153,.18)');
          x.beginPath();
          x.ellipse(PX + p.w/2, PY + p.h/2, p.w * 0.7, p.h * 0.6, 0, 0, 7);
          x.fill();
        }
        x.save();
        x.translate(PX + p.w/2, PY + p.h/2);
        x.scale(p.face, 1);
        x.translate(-(PX + p.w/2), -(PY + p.h/2));
        x.fillStyle = '#ef4444';
        x.fillRect(PX + 10*sx, PY + 18*sy, 22*sx, 30*sy);
        x.fillStyle = '#f5c9a5';
        x.fillRect(PX + 11*sx, PY + 8*sy, 20*sx, 16*sy);
        x.fillStyle = p.power === 'fire' ? '#fb7185' : (p.power === 'ice' ? '#60a5fa' : (p.power === 'giant' ? '#34d399' : '#b91c1c'));
        x.fillRect(PX + 7*sx, PY + 4*sy, 28*sx, 8*sy);
        x.fillRect(PX + 6*sx, PY + 10*sy, 16*sx, 4*sy);
        x.fillStyle = '#111827';
        x.fillRect(PX + 12*sx, PY + 48*sy, 8*sx, 8*sy);
        x.fillRect(PX + 22*sx, PY + 48*sy, 8*sx, 8*sy);
        x.fillStyle = p.power === 'giant' ? '#059669' : '#2563eb';
        x.fillRect(PX + 6*sx, PY + 24*sy, 8*sx, 22*sy);
        x.fillRect(PX + 28*sx, PY + 24*sy, 8*sx, 22*sy);
        x.restore();
      }

      if (flag) {
        FX = flag.x - cam;
        x.fillStyle = '#f8fafc';
        x.fillRect(FX, flag.y, 8, flag.h);
        x.fillStyle = '#22c55e';
        x.beginPath();
        x.moveTo(FX+8, flag.y+12);
        x.lineTo(FX+56, flag.y+24);
        x.lineTo(FX+8, flag.y+40);
        x.closePath();
        x.fill();
      }
    }

    function runTests(){
      var tPlayer = mk(0,0,10,10);
      var tWall = { x:20, y:0, w:10, h:20, t:'g', dead:0 };
      console.assert(A(tPlayer, tWall) === false, 'A: separated objects should not collide');
      console.assert(A(tPlayer, { x:5, y:5, w:10, h:10 }) === true, 'A: overlapping objects should collide');
      console.assert(A(undefined, tWall) === false, 'A: undefined object should be handled safely');

      var m = { x:0, y:0, w:10, h:4, t:'m', min:0, max:10, v:4, dead:0, dx:0 };
      updateSolid(m);
      console.assert(m.x === 4 && m.dx === 4, 'mover: should advance and store dx');

      var v = { t:'v', ph:0, dead:0 };
      console.assert(solidActive(v,0) === true && solidActive(v,130) === false, 'vanish: should toggle by time');

      var cr = { t:'cr', timer:1, gone:0, dead:0, dx:0 };
      updateSolid(cr);
      console.assert(cr.gone === 180, 'crumble: should disappear after timer');

      reset();
      console.assert(!!p && typeof p.x === 'number', 'reset: player should initialize before loop');
      console.assert(Object.prototype.toString.call(boxes) === '[object Array]' && boxes.length === 5, 'reset: boxes should initialize');
      console.assert(Object.prototype.toString.call(hazardPipes) === '[object Array]' && hazardPipes.length === 4, 'reset: hazard pipes should initialize');
      console.assert(Object.prototype.toString.call(fakeChecks) === '[object Array]' && fakeChecks.length === 3, 'reset: fake checkpoints should initialize');

      var dmgPlayer = { x:0, y:0, w:10, h:10 };
      var dmgHazard = { x:5, y:5, w:10, h:10 };
      console.assert(A(dmgPlayer, dmgHazard) === true, 'hazard: contact area should be detectable');
    }

    ovb.onclick = function(){ hide(); msgAction(); };
    restartBtn.onclick = reset;

    window.addEventListener('keydown', function(e){
      K[e.key] = 1;
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') e.preventDefault();
      if (e.repeat) return;
      if ((e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && p) p.buf = 8;
      if (e.key === 'f' || e.key === 'F') usePower();
    }, false);

    window.addEventListener('keyup', function(e){
      K[e.key] = 0;
    }, false);

    reset();
    runTests();

    (function loop(){
      step();
      draw();
      window.requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
